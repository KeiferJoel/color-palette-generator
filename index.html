<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
    >
</head>
<body>

    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <!-- NUEVO: botón de tema -->
    <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema">
        <i class="fa-solid fa-sun"></i>
    </button>

    <main class="container">

        <header>

            <h1>
                Color <span>Palette</span> Generator
            </h1>

            <p>
                Generate beautiful color palettes and copy HEX codes with one click.
            </p>

            <div class="line"></div>

        </header>

        <section class="palette" id="palette">

        </section>

        <button id="generateBtn">

            <i class="fa-solid fa-rotate"></i>

            Generate New Palette

        </button>

        <p class="tip">
            Press <kbd>Space</kbd> to generate a new palette
        </p>

        <footer>
            Made with 💜 by Joel Pichardo (Keifer Joel)
        </footer>

    </main>

    <div id="toast">
        Color copied successfully!
    </div>

    <script src="script.js"></script>

</body>
</html>
